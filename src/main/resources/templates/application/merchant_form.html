<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVA Store - Apply as Merchant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --eva-gold: #D4AF37;
            --eva-black: #111111;
            --eva-dark: #222222;
        }
        body {
            background-color: var(--eva-black);
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .eva-card {
            background-color: var(--eva-dark);
            border: 1px solid var(--eva-gold);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(212, 175, 55, 0.2);
        }
        .text-gold { color: var(--eva-gold) !important; }
        .btn-gold {
            background-color: var(--eva-gold);
            color: var(--eva-black);
            font-weight: bold;
            border: none;
        }
        .btn-gold:hover {
            background-color: #F1C40F;
            color: var(--eva-black);
        }
        .form-control, .form-select {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }
        .form-control:focus, .form-select:focus {
            background-color: #444;
            color: #fff;
            border-color: var(--eva-gold);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-5">
                    <h1 class="text-gold fw-bold">EVA</h1>
                    <h4>Merchant Partner Application</h4>
                    <p class="text-muted">Join the EVA network as a reseller or distributor</p>
                </div>
                
                <div class="eva-card p-5">
                    <form th:action="@{/apply/merchant}" th:object="${merchantApplication}" method="post">
                        
                        <h5 class="text-gold mb-3 border-bottom border-secondary pb-2">Personal & Contact Info</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Owner Name</label>
                                <input type="text" class="form-control" th:field="*{ownerName}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Mobile Number</label>
                                <input type="text" class="form-control" th:field="*{mobileNumber}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Email Address</label>
                                <input type="email" class="form-control" th:field="*{emailAddress}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Business Type</label>
                                <select class="form-select" th:field="*{businessType}" required>
                                    <option value="">Select Type...</option>
                                    <option value="Beauty Parlour">Beauty Parlour</option>
                                    <option value="Salon">Salon</option>
                                    <option value="Cosmetic Shop">Cosmetic Shop</option>
                                    <option value="Distributor">Distributor</option>
                                    <option value="Reseller">Reseller</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <h5 class="text-gold mb-3 border-bottom border-secondary pb-2">Address</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <label class="form-label text-muted">Full Address</label>
                                <textarea class="form-control" th:field="*{address}" rows="2" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">City</label>
                                <input type="text" class="form-control" th:field="*{city}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">State</label>
                                <input type="text" class="form-control" th:field="*{state}" required>
                            </div>
                        </div>

                        <h5 class="text-gold mb-3 border-bottom border-secondary pb-2">KYC Details (Mock URLs for now)</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Aadhar Number</label>
                                <input type="text" class="form-control" th:field="*{aadharNumber}" required>
                                <input type="hidden" th:field="*{aadharDocumentUrl}" value="/mock/aadhar.jpg">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">PAN Number</label>
                                <input type="text" class="form-control" th:field="*{panNumber}" required>
                                <input type="hidden" th:field="*{panDocumentUrl}" value="/mock/pan.jpg">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">GST Number (Optional)</label>
                                <input type="text" class="form-control" th:field="*{gstNumber}">
                                <input type="hidden" th:field="*{gstDocumentUrl}" value="/mock/gst.jpg">
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-gold btn-lg">Submit Application</button>
                        </div>
                    </form>
                </div>
                <div class="text-center mt-4">
                    <a href="/" class="text-muted text-decoration-none">&larr; Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
