<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Application – EVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .apply-page {
            background-color: #0c0c0c;
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .form-card {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            margin-top: 40px;
        }

        .brand-gold {
            color: #c9a84c;
        }

        .form-label {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(201, 168, 76, 0.15);
            border-radius: 12px;
            color: #fff;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #c9a84c;
            color: #fff;
            box-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
        }

        .btn-submit {
            background: linear-gradient(135deg, #c9a84c 0%, #9e7f2f 100%);
            border: none;
            color: #111;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #e2c26d 0%, #c9a84c 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 76, 0.4);
        }

        .invalid-feedback {
            font-size: 0.78rem;
            color: #e74c3c;
        }
        
        .success-box {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.25);
            color: #2ecc71;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body class="apply-page">

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Success Message -->
                <div th:if="${param.success}" class="success-box animate-fade-up">
                    <i class="bi bi-patch-check-fill d-block mb-3" style="font-size: 3rem;"></i>
                    <h4 class="brand-font mb-2">Application Submitted!</h4>
                    <p class="small text-white-50 mb-4">
                        Thank you for applying to become an EVA Agent. Our administration team is reviewing your application. You will be notified once a decision is made.
                    </p>
                    <a href="/dashboard" class="btn btn-sm btn-outline-light px-4 py-2 rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                    </a>
                </div>

                <!-- Form Card -->
                <div th:unless="${param.success}" class="form-card animate-fade-up">
                    <div class="text-center mb-5">
                        <span style="font-size: 2.5rem;">❤️</span>
                        <h2 class="brand-font mt-2 mb-1">Agent Application</h2>
                        <p class="text-white-50 small">Join the EVA frontliner team and unlock growth opportunities.</p>
                    </div>

                    <form th:action="@{/store/agent/apply}" th:object="${agentRequest}" method="post">
                        
                        <div class="row g-3">
                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label for="fullName" class="form-label">Full Name</label>
                                <input type="text" th:field="*{fullName}" id="fullName" class="form-control" 
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" placeholder="Enter your full name" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                            </div>
                            
                            <!-- Mobile Number -->
                            <div class="col-md-6">
                                <label for="mobile" class="form-label">Mobile Number</label>
                                <input type="text" th:field="*{mobile}" id="mobile" class="form-control" 
                                       th:classappend="${#fields.hasErrors('mobile')} ? 'is-invalid' : ''" placeholder="10-digit mobile number" 
                                       pattern="^[6-9][0-9]{9}$" title="Enter a valid 10-digit mobile number starting with 6-9" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-12">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" th:field="*{email}" id="email" class="form-control" 
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" placeholder="Enter your email address" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>

                            <!-- Address -->
                            <div class="col-md-12">
                                <label for="address" class="form-label">Residential Address</label>
                                <input type="text" th:field="*{address}" id="address" class="form-control" 
                                       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''" placeholder="Flat / House no, Street, Area" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                            </div>

                            <!-- City -->
                            <div class="col-md-6">
                                <label for="city" class="form-label">City</label>
                                <input type="text" th:field="*{city}" id="city" class="form-control" 
                                       th:classappend="${#fields.hasErrors('city')} ? 'is-invalid' : ''" placeholder="City name" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                            </div>

                            <!-- State -->
                            <div class="col-md-6">
                                <label for="state" class="form-label">State</label>
                                <input type="text" th:field="*{state}" id="state" class="form-control" 
                                       th:classappend="${#fields.hasErrors('state')} ? 'is-invalid' : ''" placeholder="State name" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></div>
                            </div>

                            <!-- Occupation -->
                            <div class="col-md-6">
                                <label for="occupation" class="form-label">Occupation</label>
                                <input type="text" th:field="*{occupation}" id="occupation" class="form-control" 
                                       th:classappend="${#fields.hasErrors('occupation')} ? 'is-invalid' : ''" placeholder="Current profession" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('occupation')}" th:errors="*{occupation}"></div>
                            </div>

                            <!-- Experience -->
                            <div class="col-md-6">
                                <label for="experience" class="form-label">Experience (Years / Area)</label>
                                <input type="text" th:field="*{experience}" id="experience" class="form-control" 
                                       th:classappend="${#fields.hasErrors('experience')} ? 'is-invalid' : ''" placeholder="e.g. 2 years in Sales" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}"></div>
                            </div>

                            <!-- Registration Type -->
                            <div class="col-md-12">
                                <label class="form-label">Registration Type</label>
                                <div class="d-flex gap-4 mt-1 mb-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{registrationType}" id="regTypeFree" value="FREE" checked>
                                        <label class="form-check-label text-white" for="regTypeFree" style="font-size:0.9rem;">
                                            Free Registration
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{registrationType}" id="regTypeStarter" value="STARTER_KIT">
                                        <label class="form-check-label text-white" for="regTypeStarter" style="font-size:0.9rem;">
                                            Starter Kit ₹10,000
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Referral Code (Optional) -->
                            <div class="col-md-12">
                                <label for="referralCode" class="form-label">Referral Code (Optional)</label>
                                <input type="text" th:field="*{referralCode}" id="referralCode" class="form-control" placeholder="Enter referee code if any">
                            </div>
                        </div>

                        <button type="submit" class="btn-submit">Submit Application</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}" class="mt-5"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script th:inline="javascript">
        document.querySelector('form').addEventListener('submit', function(e) {
            const starterRadio = document.getElementById('regTypeStarter');
            if (starterRadio && starterRadio.checked) {
                e.preventDefault(); // Intercept form submission
                
                const form = e.target;
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                const formData = {
                    fullName: document.getElementById('fullName').value,
                    mobile: document.getElementById('mobile').value,
                    email: document.getElementById('email').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    occupation: document.getElementById('occupation').value,
                    experience: document.getElementById('experience').value,
                    referralCode: document.getElementById('referralCode').value,
                    registrationType: 'STARTER_KIT'
                };

                const btn = document.querySelector('.btn-submit');
                const origText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation: spin 1s linear infinite; display: inline-block;"></i> Initiating Payment...';

                fetch('/store/agent/pay-initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.validationErrors) {
                        btn.disabled = false;
                        btn.innerHTML = origText;
                        alert("Please correct validation errors:\n" + Object.values(data.validationErrors).join("\n"));
                        return;
                    }
                    if (data.error) {
                        btn.disabled = false;
                        btn.innerHTML = origText;
                        alert("Error: " + data.error);
                        return;
                    }

                    const options = {
                        key: data.razorpayKeyId,
                        amount: Math.round(data.amount * 100),
                        currency: 'INR',
                        name: 'EVA',
                        description: 'Agent Starter Kit Registration',
                        image: '/images/logo.png',
                        order_id: data.razorpayOrderId,
                        handler: function(response) {
                            btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation: spin 1s linear infinite; display: inline-block;"></i> Finalizing Application...';
                            
                            fetch(`/store/agent/apply-confirm?paymentId=${response.razorpay_payment_id}&orderId=${response.razorpay_order_id}&signature=${response.razorpay_signature}`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(formData)
                            })
                            .then(r => r.json())
                            .then(confirmRes => {
                                if (confirmRes.success) {
                                    window.location.href = '/store/status';
                                } else {
                                    btn.disabled = false;
                                    btn.innerHTML = origText;
                                    alert("Application confirmation failed: " + confirmRes.error);
                                }
                            })
                            .catch(err => {
                                btn.disabled = false;
                                btn.innerHTML = origText;
                                console.error(err);
                                alert("Failed to confirm application registration.");
                            });
                        },
                        prefill: {
                            name: formData.fullName,
                            email: formData.email,
                            contact: formData.mobile
                        },
                        theme: { color: '#c9a84c' },
                        modal: {
                            ondismiss: function() {
                                btn.disabled = false;
                                btn.innerHTML = origText;
                            }
                        }
                    };

                    const rzp = new Razorpay(options);
                    rzp.on('payment.failed', function(resp) {
                        alert('Payment failed: ' + (resp.error.description || 'Please try again.'));
                        btn.disabled = false;
                        btn.innerHTML = origText;
                    });
                    rzp.open();
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerHTML = origText;
                    console.error(err);
                    alert("Could not contact payment service.");
                });
            }
        });

        // Spin animation styles
        const style = document.createElement('style');
        style.textContent = '@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }';
        document.head.appendChild(style);
    </script>
</body>
</html>
