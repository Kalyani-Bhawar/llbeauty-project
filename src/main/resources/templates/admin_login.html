<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – L.L. BEAUTY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #111 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(201, 168, 76, 0.05) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(201, 168, 76, 0.03) 0%, transparent 60%);
            animation: subtle-rotate 30s linear infinite;
        }
        @keyframes subtle-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .auth-card-premium {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            color: #fff;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201, 168, 76, 0.15);
            position: relative;
            z-index: 1;
            animation: card-appear 0.6s ease-out;
        }
        @keyframes card-appear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .auth-logo span {
            color: #c9a84c;
            font-style: italic;
        }
        .auth-subtitle {
            text-align: center;
            margin-bottom: 32px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }
        .form-control {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #c9a84c;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
        }
        .form-control::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .form-label {
            color: #c9a84c;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-admin-login {
            background: linear-gradient(135deg, #c9a84c 0%, #b8963a 100%);
            color: #111;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-admin-login:hover {
            background: linear-gradient(135deg, #d4b45c 0%, #c9a84c 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 168, 76, 0.3);
        }
        .btn-admin-login:active {
            transform: translateY(0);
        }
        .back-link {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #c9a84c;
        }
        .lock-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #c9a84c 0%, #b8963a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.3rem;
        }
		/* Prevent Chrome Autofill Background */
		
		.form-control:-webkit-autofill,
		.form-control:-webkit-autofill:hover,
		.form-control:-webkit-autofill:focus,
		.form-control:-webkit-autofill:active {
		
		    -webkit-box-shadow: 0 0 0 1000px rgba(255,255,255,0.06) inset !important;
		
		    -webkit-text-fill-color: #fff !important;
		
		    border: 1px solid rgba(255,255,255,0.12) !important;
		
		    transition: background-color 5000s ease-in-out 0s;
		}
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="auth-container">
        <div class="auth-card-premium">
            <div class="lock-icon">🔐</div>
            <h2 class="auth-logo text-white">Admin <span>Login</span></h2>
            <p class="auth-subtitle" style="color: rgba(255,255,255,0.5);">Secure access to L.L. Beauty Control Panel</p>

            <!-- Alert -->
            <div th:if="${error}" class="alert alert-danger bg-danger text-white border-0" role="alert" 
                 style="border-radius: 12px; font-size: 0.85rem;" th:text="${error}"></div>

            <form th:action="@{/auth/admin/login}"  method="POST" autocomplete="off">
				<!-- Prevent Browser Autofill -->
				<input type="text" name="fakeusernameremembered" style="display:none">
				<input type="password" name="fakepasswordremembered" style="display:none">
				<div class="mb-3">
                    <label for="email" class="form-label">Admin Email</label>
					<input type="email"
					       class="form-control"
					       id="email"
					       name="email"
					       placeholder="Enter your admin email"
					       autocomplete="off"
					       autocorrect="off"
					       autocapitalize="off"
					       spellcheck="false"
					       required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
					<input type="password"
					       class="form-control"
					       id="password"
					       name="password"
					       placeholder="Enter your password"
					       autocomplete="new-password"
					       required>
                </div>

                <button type="submit" class="btn-admin-login w-100">
                    Sign In &nbsp;→
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="/auth/login" class="back-link">← Back to User Login</a>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
