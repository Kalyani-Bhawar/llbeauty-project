<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Merchant Applications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Merchant Partner Applications</h2>
        
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <table class="table table-bordered mt-4">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Owner Name</th>
                    <th>Business Type</th>
                    <th>Mobile</th>
                    <th>City/State</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app : ${applications}">
                    <td th:text="${app.id}"></td>
                    <td th:text="${app.ownerName}"></td>
                    <td th:text="${app.businessType}"></td>
                    <td th:text="${app.mobileNumber}"></td>
                    <td th:text="${app.city + ', ' + app.state}"></td>
                    <td th:text="${app.status}"></td>
                    <td>
                        <form th:if="${app.status.name() == 'PENDING'}" th:action="@{/admin/merchants/applications/{id}/approve(id=${app.id})}" method="post" style="display:inline;">
                            <button class="btn btn-sm btn-success">Approve</button>
                        </form>
                        <form th:if="${app.status.name() == 'PENDING'}" th:action="@{/admin/merchants/applications/{id}/reject(id=${app.id})}" method="post" style="display:inline;">
                            <button class="btn btn-sm btn-danger">Reject</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(applications)}">
                    <td colspan="7" class="text-center">No applications found.</td>
                </tr>
            </tbody>
        </table>
        
        <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</body>
</html>
