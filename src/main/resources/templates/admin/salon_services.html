<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::div.content})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div class="content">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-start mb-5">
            <div>
                <h1 class="page-title mb-1">Salon Services</h1>
                <div class="page-subtitle">Dynamically manage services offered in L.L. Beauty salon.</div>
            </div>
            <a href="/admin/salon-services/new" class="btn btn-sm btn-gold px-4 py-2" style="font-size:0.85rem; border-radius: 8px;">
                <i class="bi bi-plus-circle-fill me-1"></i> Add Service
            </a>
        </div>

        <!-- Success/Error Alerts -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 rounded-3 mb-4" style="background: rgba(46,204,113,0.15); color: #2ecc71;">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 rounded-3 mb-4" style="background: rgba(231,76,60,0.15); color: #e74c3c;">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Services Card -->
        <div class="data-card">
            <div class="data-card-header">
                <h6><i class="bi bi-scissors me-2" style="color:#c9a84c;"></i>Services Offered</h6>
                <span style="font-size:0.78rem;color:rgba(255,255,255,0.4);" th:text="${services.size()} + ' Services'">0 Services</span>
            </div>
            <div class="table-responsive">
                <table class="table mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Service Name</th>
                            <th>Price</th>
                            <th>Duration</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="srv : ${services}">
                            <td style="font-size:0.8rem;color:rgba(255,255,255,0.4);" th:text="${srv.id}">1</td>
                            <td>
                                <img th:src="${srv.imageUrl ?: '/images/haircare.png'}" alt="Service Image" class="rounded" style="width: 50px; height: 50px; object-fit: cover; border: 1.5px solid var(--gold);">
                            </td>
                            <td>
                                <div style="font-weight:600;font-size:0.88rem;" th:text="${srv.name}">Hair Cut</div>
                            </td>
                            <td>
                                <span style="font-weight:700;font-size:0.92rem;color:#c9a84c;">
                                    ₹<span th:text="${srv.price}">0</span>
                                </span>
                            </td>
                            <td style="font-size:0.83rem;" th:text="${srv.durationMinutes} + ' mins'">45 mins</td>
                            <td>
                                <div style="font-size:0.8rem; color:rgba(255,255,255,0.7); max-width: 300px; white-space: normal;" th:text="${srv.description}">Description</div>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/admin/salon-services/edit/{id}(id=${srv.id})}" class="btn btn-sm btn-outline-light" style="border-radius: 6px;">
                                        <i class="bi bi-pencil"></i> Edit
                                    </a>
                                    <form th:action="@{/admin/salon-services/delete/{id}(id=${srv.id})}" method="POST" onsubmit="return confirm('Delete this service permanently?');" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius: 6px;">
                                            <i class="bi bi-trash3"></i> Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(services)}">
                            <td colspan="7" class="empty-state">
                                <i class="bi bi-scissors"></i>
                                No services found. Add some services using the button above.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
