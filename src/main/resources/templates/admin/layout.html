<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - L.L. BEAUTY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #e0e0e0; overflow-x: hidden; }

        /* ─── Sidebar ─── */
        .admin-sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 260px;
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
            border-right: 1px solid rgba(201,168,76,0.1);
            padding: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar-brand {
            padding: 28px 24px;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #c9a84c;
            border-bottom: 1px solid rgba(201,168,76,0.12);
            letter-spacing: 1px;
        }
        .sidebar-brand span { color: #fff; }
        .sidebar-nav { flex: 1; padding: 16px 0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 24px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            border-left: 3px solid transparent;
            transition: all 0.25s ease;
        }
        .sidebar-nav a:hover {
            color: #c9a84c;
            background: rgba(201,168,76,0.06);
            border-left-color: rgba(201,168,76,0.3);
        }
        .sidebar-nav a.active {
            color: #c9a84c;
            background: rgba(201,168,76,0.1);
            border-left-color: #c9a84c;
        }
        .sidebar-nav a i {
            font-size: 1.1rem;
            width: 22px;
            text-align: center;
        }
        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(201,168,76,0.08);
        }
        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e74c3c;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 10px 0;
            transition: opacity 0.2s;
        }
        .sidebar-footer a:hover { opacity: 0.8; }

        /* ─── Main content area ─── */
        .admin-main {
            margin-left: 260px;
            min-height: 100vh;
        }

        /* ─── Top bar ─── */
        .admin-topbar {
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.08);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 90;
        }
        .admin-topbar h5 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            margin: 0;
            font-size: 1.1rem;
        }
        .admin-topbar .btn-view-site {
            background: transparent;
            color: #c9a84c;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .admin-topbar .btn-view-site:hover {
            background: rgba(201,168,76,0.1);
            border-color: #c9a84c;
        }

        /* ─── Content area ─── */
        .admin-content {
            padding: 32px;
        }

        /* ─── Dashboard stat cards ─── */
        .stat-card {
            background: linear-gradient(145deg, rgba(30,30,30,0.8) 0%, rgba(20,20,20,0.9) 100%);
            border: 1px solid rgba(201,168,76,0.1);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: rgba(201,168,76,0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(201,168,76,0.08), transparent 70%);
            border-radius: 0 16px 0 0;
        }
        .stat-card .stat-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        .stat-card .stat-icon.gold { background: rgba(201,168,76,0.15); color: #c9a84c; }
        .stat-card .stat-icon.emerald { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .stat-card .stat-icon.ruby { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .stat-card .stat-icon.sapphire { background: rgba(52,152,219,0.15); color: #3498db; }
        .stat-card .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
        }

        /* ─── Data table cards ─── */
        .data-card {
            background: rgba(25,25,25,0.9);
            border: 1px solid rgba(201,168,76,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        .data-card-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(201,168,76,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-card-header h6 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            margin: 0;
            font-size: 1rem;
        }
        .table { color: #ddd; margin: 0; }
        .table thead th {
            background: rgba(201,168,76,0.06);
            color: #c9a84c;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            border-bottom: 1px solid rgba(201,168,76,0.1);
            padding: 14px 16px;
        }
        .table tbody td {
            padding: 14px 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }
        .table tbody tr:hover {
            background: rgba(201,168,76,0.03);
        }
        .badge-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-pending { background: rgba(243,156,18,0.15); color: #f39c12; }
        .badge-completed { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .badge-cancelled { background: rgba(231,76,60,0.15); color: #e74c3c; }

        .empty-state {
            padding: 48px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; }

        /* ─── Page title ─── */
        .page-title {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .admin-sidebar { width: 200px; }
            .admin-main { margin-left: 200px; }
            .admin-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <div class="sidebar-brand">
                <span>L.L.</span> BEAUTY
            </div>
            <div class="sidebar-nav">
                <a href="/admin/dashboard"
                   th:classappend="${activeTab == 'dashboard' ? 'active' : ''}">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="/admin/appointments"
                   th:classappend="${activeTab == 'appointments' ? 'active' : ''}">
                    <i class="bi bi-calendar-check-fill"></i> Salon Bookings
                </a>
                <a href="/admin/franchise-leads"
                   th:classappend="${activeTab == 'franchise-leads' ? 'active' : ''}">
                    <i class="bi bi-building-fill"></i> Franchise Leads
                </a>
                <a href="/admin/users"
                   th:classappend="${activeTab == 'users' ? 'active' : ''}">
                    <i class="bi bi-people-fill"></i> Users
                </a>
                <a href="/admin/products"
                   th:classappend="${activeTab == 'products' ? 'active' : ''}">
                    <i class="bi bi-bag-heart-fill"></i> Products
                </a>
                <a href="/admin/orders"
                   th:classappend="${activeTab == 'orders' ? 'active' : ''}">
                    <i class="bi bi-box-seam-fill"></i> Orders
                </a>
                <a href="/admin/memberships"
                   th:classappend="${activeTab == 'memberships' ? 'active' : ''}">
                    <i class="bi bi-award-fill"></i> Membership Plans
                </a>
                <a href="/admin/membership-users"
                   th:classappend="${activeTab == 'membership-users' ? 'active' : ''}">
                    <i class="bi bi-person-badge-fill"></i> VIP Members
                </a>
                <a href="/admin/wallet-transactions"
                   th:classappend="${activeTab == 'wallet-transactions' ? 'active' : ''}">
                    <i class="bi bi-wallet2"></i> Wallet Ledger
                </a>
                <a href="/admin/salon-info"
                   th:classappend="${activeTab == 'salon-info' ? 'active' : ''}">
                    <i class="bi bi-shop"></i> Salon Info
                </a>
                <a href="/admin/manual-payments"
                   th:classappend="${activeTab == 'manual-payments' ? 'active' : ''}">
                    <i class="bi bi-cash-stack"></i> Manual Payments
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="/auth/logout"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <!-- Topbar -->
            <div class="admin-topbar">
                <h5>Admin Panel</h5>
                <a href="/" class="btn-view-site"><i class="bi bi-eye"></i> View Site</a>
            </div>

            <!-- Content Area -->
            <div class="admin-content" th:replace="${content}">
                <!-- Page Content Injected Here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
