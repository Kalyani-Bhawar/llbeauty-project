<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::div.content})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Franchise Leads</h2>
        </div>
        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Email</th>
                            <th>City</th>
                            <th>Location</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Applied At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lead : ${leads}">
                            <td th:text="${lead.id}">1</td>
                            <td th:text="${lead.name}">Jane Doe</td>
                            <td th:text="${lead.mobile}">9876543210</td>
                            <td th:text="${lead.email}">jane@example.com</td>
                            <td th:text="${lead.city}">Mumbai</td>
                            <td th:text="${lead.preferredLocation}">Bandra West</td>
                            <td><span class="badge bg-info text-dark" th:text="${lead.franchiseType}">Studio</span></td>
                            <td>
                                <span class="badge bg-secondary" th:if="${lead.status == 'NEW'}">NEW</span>
                                <span class="badge bg-warning text-dark" th:if="${lead.status == 'CONTACTED'}">CONTACTED</span>
                                <span class="badge bg-primary" th:if="${lead.status == 'IN_PROGRESS'}">IN_PROGRESS</span>
                                <span class="badge bg-success" th:if="${lead.status == 'APPROVED'}">APPROVED</span>
                                <span class="badge bg-danger" th:if="${lead.status == 'REJECTED'}">REJECTED</span>
                            </td>
                            <td th:text="${#temporals.format(lead.createdAt, 'dd-MM-yyyy HH:mm')}">Date</td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline-info" data-bs-toggle="modal" th:data-bs-target="'#updateLeadModal' + ${lead.id}" title="Update Lead">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <form th:action="@{/admin/franchise-leads/{id}/delete(id=${lead.id})}" method="POST" onsubmit="return confirm('Delete this lead?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        
                        <!-- Update Lead Modal -->
                        <div th:each="lead : ${leads}" class="modal fade" th:id="'updateLeadModal' + ${lead.id}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <form th:action="@{/admin/franchise-leads/{id}/update(id=${lead.id})}" method="post">
                                        <div class="modal-header">
                                            <h5 class="modal-title text-dark">Update Lead <span th:text="${lead.name}"></span></h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                        </div>
                                        <div class="modal-body text-dark">
                                            <p><strong>Message:</strong> <span th:text="${lead.message}"></span></p>
                                            <div class="mb-3">
                                                <label class="form-label">Status</label>
                                                <select name="status" class="form-select" required>
                                                    <option value="NEW" th:selected="${lead.status == 'NEW'}">New</option>
                                                    <option value="CONTACTED" th:selected="${lead.status == 'CONTACTED'}">Contacted</option>
                                                    <option value="IN_PROGRESS" th:selected="${lead.status == 'IN_PROGRESS'}">In Progress</option>
                                                    <option value="APPROVED" th:selected="${lead.status == 'APPROVED'}">Approved</option>
                                                    <option value="REJECTED" th:selected="${lead.status == 'REJECTED'}">Rejected</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Admin Remarks</label>
                                                <textarea name="remarks" class="form-control" rows="3" th:text="${lead.adminRemarks}"></textarea>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                            <button type="submit" class="btn btn-info">Update Lead</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <tr th:if="${#lists.isEmpty(leads)}">
                            <td colspan="10" class="text-center py-4 text-muted">No franchise leads found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/franchise-leads(page=${currentPage - 1}, search=${search}, status=${status})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                        th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link" th:href="@{/admin/franchise-leads(page=${i}, search=${search}, status=${status})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/franchise-leads(page=${currentPage + 1}, search=${search}, status=${status})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</body>
</html>
