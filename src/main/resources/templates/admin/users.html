<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::div.content})}">
<body>
    <div class="content">
        <h2 class="mb-4">Registered Users</h2>
        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Email</th>
                            <th>Wallet Balance</th>
                            <th>Joined At</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.name}">John Doe</td>
                            <td th:text="${user.mobile}">9876543210</td>
                            <td th:text="${user.email}">john@example.com</td>
                            <td class="text-success font-weight-bold">₹<span th:text="${#numbers.formatDecimal(user.walletBalance, 1, 0)}">0</span></td>
                            <td th:text="${#temporals.format(user.createdAt, 'dd-MM-yyyy HH:mm')}">Date</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" class="text-center py-4 text-muted">No users found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
