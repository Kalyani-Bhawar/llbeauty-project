<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::div.content})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div class="content">
        <h2 class="mb-4">Membership Plan</h2>
        <div class="card p-4 mx-auto" style="max-width: 600px;">
            <form th:action="@{/admin/memberships/save}" method="post" th:object="${membership}">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Plan Name</label>
                    <input type="text" class="form-control bg-dark text-white" th:field="*{name}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Yearly Price (₹)</label>
                    <input type="number" step="0.01" class="form-control bg-dark text-white" th:field="*{price}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Duration (Days)</label>
                    <input type="number" class="form-control bg-dark text-white" th:field="*{durationDays}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Duration (Months)</label>
                    <input type="number" class="form-control bg-dark text-white" th:field="*{durationMonths}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Welcome Credits</label>
                    <input type="number" step="0.01" class="form-control bg-dark text-white" th:field="*{welcomeCredits}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Cashback Rate (e.g., 0.05 for 5%)</label>
                    <input type="number" step="0.01" max="1" class="form-control bg-dark text-white" th:field="*{cashbackPercent}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Benefits List (New line separated)</label>
                    <textarea class="form-control bg-dark text-white" th:field="*{benefits}" rows="5" required></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{active}">
                    <label class="form-check-label">Active</label>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/memberships}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-gold">Save Plan</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
