<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::div.content})}">
<body>
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Products</h2>
            <a href="/admin/products/new" class="btn btn-gold btn-sm px-4">
                <i class="bi bi-plus-lg"></i> Add New Product
            </a>
        </div>
        
        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card data-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
							<th>Image</th>
							<th>Name</th>
							<th>Category</th>
							<th>Price</th>
							<th>Merchant Discount</th>
							<th>Wholesale Price</th>
							<th>Stock</th>
							<th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td>
                                <img th:src="${product.imageUrl}" alt="Product" class="rounded" style="width: 50px; height: 50px; object-fit: cover; border: 1px solid rgba(201,168,76,0.3);">
                            </td>
                            <td th:text="${product.name}" class="fw-bold">Name</td>
                            <td><span class="badge bg-secondary" th:text="${product.category}">Category</span></td>
							<td class="text-gold fw-bold"
							    th:text="'₹' + ${product.price}">
							</td>
							
							<td>
							    <span class="badge bg-warning text-dark"
							          th:text="${product.merchantDiscount} + '%'">
							    </span>
							</td>
							
							<td class="text-info fw-bold"
							    th:text="'₹' + ${product.wholesalePrice}">
							</td>
							
							<td>
							    <span th:if="${product.stock > 0}"
							          class="text-success fw-bold"
							          th:text="${product.stock} + ' In Stock'">
							    </span>
							
							    <span th:if="${product.stock <= 0}"
							          class="text-danger fw-bold">
							          Out of Stock
							    </span>
							</td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-info">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="POST" onsubmit="return confirm('Delete this product?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="8" class="text-center py-5 text-muted">
                                <i class="bi bi-box-seam" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
                                No products found. Add a new product to get started.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
