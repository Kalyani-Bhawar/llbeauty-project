<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP – L.L. BEAUTY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--beige) 0%, #ede5d5 100%);
            padding: 40px 20px;
        }
        .auth-card-premium {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(201, 168, 76, 0.15);
        }
        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .otp-input {
            width: 45px;
            height: 50px;
            font-size: 1.25rem;
            text-align: center;
            border: 1.5px solid rgba(201, 168, 76, 0.3);
            border-radius: 8px;
            background: var(--white);
            color: var(--dark);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .otp-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="auth-container">
        <div class="auth-card-premium animate-fade-up">
            <h2 class="auth-logo brand-font">L.L. <span>BEAUTY</span></h2>
            <p class="auth-subtitle">Verify OTP sent to <span th:text="${email}" style="font-weight: 600; color: var(--dark);"></span></p>

            <!-- Alerts -->
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
            <div th:if="${info}" class="alert alert-info" role="alert" th:text="${info}"></div>

            <form th:action="@{/auth/verify}" method="POST" onsubmit="assembleOtp()">
                <input type="hidden" name="email" th:value="${email}">
                <input type="hidden" name="redirect" th:value="${redirect}">
                
                <div class="mb-4">
                    <label class="form-label d-block text-center mb-3">Enter 6-Digit OTP</label>
                    <div class="otp-inputs mb-3">
                        <input type="text" class="otp-input" maxlength="1" required pattern="\d" oninput="moveFocus(this, 1)">
                        <input type="text" class="otp-input" maxlength="1" required pattern="\d" oninput="moveFocus(this, 2)">
                        <input type="text" class="otp-input" maxlength="1" required pattern="\d" oninput="moveFocus(this, 3)">
                        <input type="text" class="otp-input" maxlength="1" required pattern="\d" oninput="moveFocus(this, 4)">
                        <input type="text" class="otp-input" maxlength="1" required pattern="\d" oninput="moveFocus(this, 5)">
                        <input type="text" class="otp-input" maxlength="1" required pattern="\d" oninput="moveFocus(this, 6)">
                    </div>
                    <!-- Hidden field to submit combined OTP -->
                    <input type="hidden" name="otp" id="fullOtp">
                </div>

                <button type="submit" class="btn-gold w-100 py-3" style="border-radius: 12px; font-size: 0.9rem;">
                    Verify &amp; Login &nbsp;→
                </button>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/auth/login(redirect=${redirect})}" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem;">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function moveFocus(current, index) {
            if (current.value.length === 1 && index < 6) {
                document.querySelectorAll('.otp-input')[index].focus();
            }
            assembleOtp();
        }

        // Handle backspace navigation
        document.querySelectorAll('.otp-input').forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value.length === 0 && index > 0) {
                    document.querySelectorAll('.otp-input')[index - 1].focus();
                }
            });
        });

        function assembleOtp() {
            let otp = '';
            document.querySelectorAll('.otp-input').forEach(input => {
                otp += input.value;
            });
            document.getElementById('fullOtp').value = otp;
        }
    </script>
</body>
</html>
