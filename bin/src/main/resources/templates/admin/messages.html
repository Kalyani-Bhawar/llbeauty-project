<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::div.content})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <div class="content">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-start mb-5">
            <div>
                <h1 class="page-title mb-1">Contact Messages</h1>
                <div class="page-subtitle">View and manage customer inquiries, feedback, and support tickets.</div>
            </div>
        </div>

        <!-- Success/Error Alerts -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 rounded-3 mb-4" style="background: rgba(46,204,113,0.15); color: #2ecc71;">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 rounded-3 mb-4" style="background: rgba(231,76,60,0.15); color: #e74c3c;">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Messages Card -->
        <div class="data-card">
            <div class="data-card-header">
                <h6><i class="bi bi-chat-left-text me-2" style="color:#c9a84c;"></i>Inboxes</h6>
                <span style="font-size:0.78rem;color:rgba(255,255,255,0.4);" th:text="${messages.size()} + ' Messages'">0 Messages</span>
            </div>
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Sender</th>
                            <th>Contact</th>
                            <th>Subject</th>
                            <th>Message</th>
                            <th>Received At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="msg : ${messages}">
                            <td style="font-size:0.8rem;color:rgba(255,255,255,0.4);" th:text="${msg.id}">1</td>
                            <td>
                                <div style="font-weight:600;font-size:0.88rem;" th:text="${msg.name}">John Doe</div>
                            </td>
                            <td>
                                <div style="font-size:0.83rem;color:rgba(255,255,255,0.7);" th:text="${msg.email}">email</div>
                                <div style="font-size:0.83rem;color:rgba(255,255,255,0.5);" th:text="${msg.phone}">phone</div>
                            </td>
                            <td>
                                <span class="badge bg-gold text-dark px-2 py-1" style="font-size: 0.72rem; border-radius: 4px;" th:text="${msg.subject ?: 'General Inquiry'}">Subject</span>
                            </td>
                            <td>
                                <div style="font-size:0.83rem; color:rgba(255,255,255,0.85); max-width: 320px; white-space: normal;" th:text="${msg.message}">The message content goes here.</div>
                            </td>
                            <td style="font-size:0.78rem;color:rgba(255,255,255,0.4);" th:text="${#temporals.format(msg.createdAt, 'dd-MM-yyyy HH:mm')}">Date</td>
                            <td>
                                <form th:action="@{/admin/contact-messages/delete/{id}(id=${msg.id})}" method="POST" onsubmit="return confirm('Are you sure you want to delete this message?');" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius: 6px;">
                                        <i class="bi bi-trash3"></i> Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(messages)}">
                            <td colspan="7" class="empty-state">
                                <i class="bi bi-chat-square-x"></i>
                                No support messages found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
