<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Profile – EVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .agent-sidebar {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(201,168,76,0.15);
            padding: 24px;
        }
        .nav-pills-gold .nav-link {
            color: var(--text-dark);
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-pills-gold .nav-link:hover {
            background: rgba(201,168,76,0.06);
            color: var(--gold-dark);
        }
        .nav-pills-gold .nav-link.active {
            background: var(--gold);
            color: var(--white);
        }
        .profile-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(201,168,76,0.12);
            padding: 32px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #c9a84c;
            box-shadow: 0 0 0 0.2rem rgba(201,168,76,0.15);
        }
    </style>
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <section class="container my-5">
        <div class="row g-4">
            <!-- SIDEBAR -->
            <div class="col-lg-3">
                <div class="agent-sidebar">
                    <div class="text-center mb-4">
                        <div class="position-relative d-inline-block">
                            <img src="/images/about_vision.png" class="rounded-circle border border-3 border-warning" style="width: 85px; height: 85px; object-fit: cover;">
                        </div>
                        <h5 class="brand-font mt-3 text-gold" th:text="${agent.user.name}">Agent Name</h5>
                        <p class="text-muted small mb-0" th:text="${agent.agentId}">EVAAG000001</p>
                    </div>
                    <hr class="my-4">
                    <div class="nav flex-column nav-pills-gold">
                        <a href="/agent/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
                        <a href="/agent/wallet" class="nav-link"><i class="bi bi-wallet2"></i> Wallet &amp; Earnings</a>
                        <a href="/agent/referrals" class="nav-link"><i class="bi bi-share"></i> My Referrals</a>
                        <a href="/agent/commissions" class="nav-link"><i class="bi bi-cash-stack"></i> Commission Ledger</a>
                        <a href="/agent/settlements" class="nav-link"><i class="bi bi-bank"></i> Settlements</a>
                        <a href="/agent/profile" class="nav-link active"><i class="bi bi-person-gear"></i> Manage Profile</a>
                    </div>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="col-lg-9">
                <div class="mb-4">
                    <h2 class="brand-font text-gold mb-1"><i class="bi bi-person-gear me-2"></i> Manage Profile</h2>
                    <p class="text-muted mb-0">Update your personal details and contact information.</p>
                </div>

                <!-- Flash Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMessage}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMessage}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- ACCOUNT INFO CARD -->
                <div class="profile-card mb-4">
                    <h5 class="brand-font text-gold mb-3"><i class="bi bi-shield-check me-2"></i> Account Information</h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label text-muted small uppercase tracking-wide">Agent ID</label>
                            <p class="fw-semibold mb-0" th:text="${agent.agentId}">EVAAG000001</p>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small uppercase tracking-wide">Referral Code</label>
                            <p class="fw-semibold text-gold mb-0" th:text="${agent.referralCode}">CODE123</p>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small uppercase tracking-wide">Status</label>
                            <p class="mb-0">
                                <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-1 rounded-pill" th:if="${agent.status == 'ACTIVE'}">Active</span>
                                <span class="badge bg-warning-subtle text-warning border border-warning-subtle px-3 py-1 rounded-pill" th:if="${agent.status != 'ACTIVE'}" th:text="${agent.status}">Status</span>
                            </p>
                        </div>
                    </div>
                    <hr class="my-3">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label text-muted small uppercase tracking-wide">Referral Link</label>
                            <div class="input-group">
                                <input type="text" class="form-control bg-light" th:value="${agent.referralLink}" id="refLink" readonly>
                                <button class="btn btn-outline-warning" onclick="navigator.clipboard.writeText(document.getElementById('refLink').value); this.innerHTML='<i class=\'bi bi-check\'></i> Copied';">
                                    <i class="bi bi-copy"></i> Copy
                                </button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small uppercase tracking-wide">Registration Type</label>
                            <p class="fw-semibold mb-0" th:text="${profile.registrationType != null ? profile.registrationType : '—'}">Package</p>
                        </div>
                    </div>
                </div>

                <!-- PROFILE FORM -->
                <div class="profile-card">
                    <h5 class="brand-font text-gold mb-4"><i class="bi bi-pencil-square me-2"></i> Personal Details</h5>
                    <form th:action="@{/agent/profile}" method="POST" th:object="${profile}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{fullName}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{mobileNumber}" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" th:field="*{dob}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Gender</label>
                                <select class="form-select" th:field="*{gender}">
                                    <option value="">Select</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" th:field="*{address}" rows="2"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">City</label>
                                <input type="text" class="form-control" th:field="*{city}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">State</label>
                                <input type="text" class="form-control" th:field="*{state}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Pincode</label>
                                <input type="text" class="form-control" th:field="*{pincode}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Occupation</label>
                                <input type="text" class="form-control" th:field="*{occupation}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Experience</label>
                                <input type="text" class="form-control" th:field="*{experience}" placeholder="e.g. 3 years in beauty industry">
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex justify-content-end gap-3">
                            <a href="/agent/dashboard" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                            <button type="submit" class="btn btn-gold rounded-pill px-4"><i class="bi bi-check2-circle me-1"></i> Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
