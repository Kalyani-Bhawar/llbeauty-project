<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – EVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--beige) 0%, #ede5d5 100%);
            padding: 40px 20px;
        }
        .auth-card-premium {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(201, 168, 76, 0.15);
        }
    </style>
    <link rel="icon" type="image/png" href="/images/eva-logo.png">
</head>
<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="auth-container">
        <div class="auth-card-premium animate-fade-up">
            <img src="/images/eva-logo.png" alt="EVA Logo" style="height: 60px; display: block; margin: 0 auto 15px;">
            <p class="auth-subtitle">Sign in to your premium beauty experience</p>

            <!-- Alerts -->
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
            <div th:if="${info}" class="alert alert-info" role="alert" th:text="${info}"></div>

            <form th:action="@{/auth/login/send-otp}" method="POST">
                <input type="hidden" name="redirect" th:value="${redirect}">
                <div class="mb-4">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           placeholder="name@example.com"
                           required>
                    <div class="form-text text-muted" style="font-size: 0.75rem; margin-top: 6px;">
                        A secure OTP will be sent to your registered email address.
                    </div>
                </div>

                <button type="submit" class="btn-gold w-100 py-3" style="border-radius: 12px; font-size: 0.9rem;">
                    Send OTP &nbsp;→
                </button>
            </form>

            <div class="divider">or</div>

            <div class="text-center">
                <p style="font-size: 0.85rem; color: var(--text-muted);">
                    New to EVA? 
                    <a href="/auth/register" style="color: var(--gold); text-decoration: none; font-weight: 600;">Create Account</a>
                </p>
                <a href="/auth/admin/login" class="admin-link">🛠️ Admin Sign In</a>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
