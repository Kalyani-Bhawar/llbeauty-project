<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – EVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--beige) 0%, #ede5d5 100%);
            padding: 40px 20px;
        }
        .auth-card-premium {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(201, 168, 76, 0.15);
        }
    </style>
    <link rel="icon" type="image/png" href="/images/eva-logo.png">
</head>
<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="auth-container">
        <div class="auth-card-premium animate-fade-up">
            <img src="/images/eva-logo.png" alt="EVA Logo" style="height: 60px; display: block; margin: 0 auto 15px;">
            <p class="auth-subtitle">Create your premium beauty account</p>

            <form th:action="@{/auth/register}" th:object="${registerRequest}" method="POST">
                
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" 
                           placeholder="Enter your name" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" 
                           placeholder="name@example.com" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-4">
                    <label for="mobile" class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control" id="mobile" th:field="*{mobile}" 
                           placeholder="Enter 10-digit mobile number" required
                           pattern="^[6-9]\d{9}$" title="Enter a valid 10-digit mobile number starting with 6-9">
                    <div class="text-danger" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></div>
                    <div class="form-text text-muted" style="font-size: 0.75rem; margin-top: 6px;">
                        A secure verification OTP will be sent to your email address.
                    </div>
                </div>

                <button type="submit" class="btn-gold w-100 py-3" style="border-radius: 12px; font-size: 0.9rem;">
                    Sign Up &nbsp;→
                </button>
            </form>

            <div class="divider">or</div>

            <div class="text-center">
                <p style="font-size: 0.85rem; color: var(--text-muted);">
                    Already have an account? 
                    <a href="/auth/login" style="color: var(--gold); text-decoration: none; font-weight: 600;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
