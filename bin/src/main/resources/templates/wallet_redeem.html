<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant QR Payment – EVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .redeem-page {
            background: #0f0f0f;
            color: #fff;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .redeem-card {
            background: #111111;
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="redeem-page">
        <div class="redeem-card animate-fade-up">
            <div style="font-size: 3rem; margin-bottom: 16px;">📲</div>
            <h3 class="brand-font text-white mb-1">Pay Merchant via QR</h3>
            <p class="text-white-50 mb-4" style="font-size:0.88rem;">Redeem your L.L. Rewards wallet credits at physical checkout desks.</p>

            <!-- Merchant info -->
            <div class="p-3 rounded mb-4 text-start" style="background: rgba(201,168,76,0.06); border: 1.5px solid rgba(201,168,76,0.25);">
                <div class="d-flex justify-content-between mb-1">
                    <span class="text-white-50" style="font-size:0.82rem;">Paying Desk:</span>
                    <strong class="text-gold" th:text="${merchant.name}">Merchant Name</strong>
                </div>
                <div class="d-flex justify-content-between mb-1" th:if="${merchant.location != null}">
                    <span class="text-white-50" style="font-size:0.82rem;">Location:</span>
                    <span class="text-white-50" style="font-size:0.82rem;" th:text="${merchant.location}">Desk Location</span>
                </div>
                <div class="d-flex justify-content-between border-top mt-2 pt-2" style="border-color:rgba(201,168,76,0.15) !important;">
                    <span class="text-white-50" style="font-size:0.82rem;">Available Balance:</span>
                    <strong class="text-white" style="font-size:0.9rem;">₹<span th:text="${#numbers.formatDecimal(walletBalance, 1, 2)}">0.00</span></strong>
                </div>
            </div>

            <!-- Payment Form -->
            <form th:action="@{/wallet/redeem/confirm}" method="post" onsubmit="return validateRedeemForm()">
                <input type="hidden" name="merchantId" th:value="${merchant.id}">
                
                <div class="mb-4 text-start">
                    <label class="form-label text-white-50">Redemption Amount (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-gold" style="font-weight:700;">₹</span>
                        <input type="number" step="0.01" class="form-control bg-dark border-secondary text-white font-weight-bold" 
                               id="redeemAmount" name="amount" placeholder="0.00" style="font-size:1.2rem;" required>
                    </div>
                </div>

                <div class="d-flex flex-column gap-2">
                    <button type="submit" class="btn btn-gold py-3 font-weight-bold">
                        <i class="bi bi-patch-check-fill me-2"></i> Confirm Wallet Redemption
                    </button>
                    <a href="/dashboard" class="btn btn-dark-outline text-white-50 btn-sm mt-2 border-0">Cancel Payment</a>
                </div>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const balance = [[${walletBalance}]];
        
        function validateRedeemForm() {
            const input = document.getElementById('redeemAmount');
            const amount = parseFloat(input.value);
            
            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid amount greater than 0.");
                return false;
            }
            if (amount > balance) {
                alert("Insufficient wallet balance. You only have ₹" + balance.toFixed(2));
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
